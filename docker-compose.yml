services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATABASE_URL: sqlite+aiosqlite:////data/yorumla.db
      MCP_AUTH_TOKEN: change-me
      BACKEND_CORS_ORIGINS: http://localhost:3000
    volumes:
      - yorumla-data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  yorumla-data:
